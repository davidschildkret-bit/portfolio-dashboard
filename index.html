<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Dashboard</title>

<style>
body {
  margin:0;
  padding:15px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#0f1115;
  color:white;
}
h1{text-align:center;}
#total{font-size:2em;text-align:center;margin:10px 0;}
#daily{text-align:center;margin-bottom:20px;}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:15px;
}
.card{
  background:#1a1d24;
  padding:15px;
  border-radius:12px;
}
.green{color:#00c853;}
.red{color:#ff5252;}
canvas{
  margin-top:30px;
  background:#1a1d24;
  border-radius:12px;
}
input{
  width:80px;
  padding:5px;
  border-radius:6px;
  border:none;
}
#error{
  text-align:center;
  color:#ff5252;
  margin-top:15px;
}
</style>
</head>
<body>

<h1>Portfolio Dashboard</h1>
<div id="total">Loading...</div>
<div id="daily"></div>
<div id="error"></div>

<div class="grid" id="grid"></div>

<canvas id="chart" height="120"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const symbols=["GCOW","NVDA","MSFT","AMD"];
const shares={GCOW:0,NVDA:0,MSFT:0,AMD:0};
let priceData={};
let chart;

function createCards(){
  const grid=document.getElementById("grid");
  symbols.forEach(sym=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <strong>${sym}</strong>
      <div id="price-${sym}">$--</div>
      <div id="change-${sym}"></div>
      Shares:<br>
      <input type="number" min="0" step="any"
        onchange="updateShares('${sym}',this.value)">
    `;
    grid.appendChild(card);
  });
}

function updateShares(sym,val){
  shares[sym]=parseFloat(val)||0;
  calculate();
}

async function fetchPrices(){
  try{
    const response=await fetch(
      "https://financialmodelingprep.com/api/v3/quote/"+symbols.join(",")+"?apikey=demo"
    );
    const data=await response.json();
    if(!Array.isArray(data)) throw new Error("API blocked");

    document.getElementById("error").textContent="";

    data.forEach(stock=>{
      priceData[stock.symbol]=stock;
      document.getElementById("price-"+stock.symbol)
        .textContent="$"+stock.price.toFixed(2);

      const el=document.getElementById("change-"+stock.symbol);
      el.textContent=
        stock.change.toFixed(2)+" ("+
        stock.changesPercentage.toFixed(2)+"%)";
      el.className=stock.change>=0?"green":"red";
    });

    calculate();
    updateChart();
  }
  catch(e){
    document.getElementById("error").textContent=
      "API blocked. You need your own free API key.";
  }
}

function calculate(){
  let total=0;
  let daily=0;

  symbols.forEach(sym=>{
    if(priceData[sym]){
      total+=shares[sym]*priceData[sym].price;
      daily+=shares[sym]*priceData[sym].change;
    }
  });

  document.getElementById("total").textContent=
    "Total Value: $"+total.toFixed(2);

  const d=document.getElementById("daily");
  d.textContent="Daily Change: $"+daily.toFixed(2);
  d.className=daily>=0?"green":"red";
}

function updateChart(){
  const now=new Date().toLocaleTimeString();
  const totalValue=Object.keys(shares).reduce((sum,sym)=>{
    if(priceData[sym])
      return sum+shares[sym]*priceData[sym].price;
    return sum;
  },0);

  if(!chart){
    chart=new Chart(document.getElementById("chart"),{
      type:"line",
      data:{
        labels:[now],
        datasets:[{
          label:"Portfolio Value",
          data:[totalValue],
          borderColor:"#37a6ef",
          tension:0.3
        }]
      },
      options:{
        scales:{
          x:{ticks:{color:"white"}},
          y:{ticks:{color:"white"}}
        },
        plugins:{legend:{labels:{color:"white"}}}
      }
    });
  }else{
    chart.data.labels.push(now);
    chart.data.datasets[0].data.push(totalValue);
    if(chart.data.labels.length>30){
      chart.data.labels.shift();
      chart.data.datasets[0].data.shift();
    }
    chart.update();
  }
}

createCards();
fetchPrices();
setInterval(fetchPrices,30000);
</script>

</body>
</html>
