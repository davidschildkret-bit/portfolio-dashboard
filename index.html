<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Dashboard</title>

<style>
body {
  margin:0;
  padding:20px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#0f1115;
  color:white;
}
h1{text-align:center;margin-bottom:10px;}
#total{
  text-align:center;
  font-size:2em;
  margin-bottom:5px;
}
#daily{
  text-align:center;
  margin-bottom:25px;
  font-size:1.2em;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}
.card{
  background:#1a1d24;
  padding:15px;
  border-radius:12px;
}
input{
  width:90px;
  padding:6px;
  border-radius:6px;
  border:none;
  margin-top:8px;
}
.green{color:#00c853;}
.red{color:#ff5252;}
.chart{
  margin-top:30px;
}
</style>
</head>
<body>

<h1>Portfolio Dashboard</h1>
<div id="total">Enter share amounts below</div>
<div id="daily"></div>

<div class="grid">

<div class="card">
  <div><strong>NVDA</strong></div>
  <div id="price-NVDA"></div>
  <div id="change-NVDA"></div>
  Shares:<br>
  <input type="number" min="0" step="any" onchange="updateShares('NVDA',this.value)">
  <div id="pos-NVDA"></div>
</div>

<div class="card">
  <div><strong>MSFT</strong></div>
  <div id="price-MSFT"></div>
  <div id="change-MSFT"></div>
  Shares:<br>
  <input type="number" min="0" step="any" onchange="updateShares('MSFT',this.value)">
  <div id="pos-MSFT"></div>
</div>

<div class="card">
  <div><strong>AMD</strong></div>
  <div id="price-AMD"></div>
  <div id="change-AMD"></div>
  Shares:<br>
  <input type="number" min="0" step="any" onchange="updateShares('AMD',this.value)">
  <div id="pos-AMD"></div>
</div>

<div class="card">
  <div><strong>GCOW</strong></div>
  <div id="price-GCOW"></div>
  <div id="change-GCOW"></div>
  Shares:<br>
  <input type="number" min="0" step="any" onchange="updateShares('GCOW',this.value)">
  <div id="pos-GCOW"></div>
</div>

</div>

<div class="chart">
<!-- TradingView Ticker Tape -->
<script src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
{
  "symbols": [
    {"proName": "NASDAQ:NVDA", "title": "NVDA"},
    {"proName": "NASDAQ:MSFT", "title": "MSFT"},
    {"proName": "NASDAQ:AMD", "title": "AMD"},
    {"proName": "NASDAQ:GCOW", "title": "GCOW"}
  ],
  "showSymbolLogo": false,
  "colorTheme": "dark",
  "isTransparent": false,
  "displayMode": "adaptive"
}
</script>
</div>

<script>
const shares = {NVDA:0, MSFT:0, AMD:0, GCOW:0};
const prices = {};
const changes = {};

function updateShares(symbol, value){
  shares[symbol] = parseFloat(value) || 0;
  calculate();
}

function calculate(){
  let total = 0;
  let daily = 0;

  Object.keys(shares).forEach(sym=>{
    if(prices[sym]){
      const position = shares[sym] * prices[sym];
      const dayMove = shares[sym] * changes[sym];
      total += position;
      daily += dayMove;

      document.getElementById("pos-"+sym).innerText =
        "Position: $" + position.toFixed(2);
    }
  });

  document.getElementById("total").innerText =
    "Total Value: $" + total.toFixed(2);

  const dailyEl = document.getElementById("daily");
  dailyEl.innerText = "Daily Change: $" + daily.toFixed(2);
  dailyEl.className = daily >= 0 ? "green" : "red";
}

// Pull visible prices from TradingView ticker tape
// (Lightweight scraping of DOM — works without API)

function extractPrices(){
  const items = document.querySelectorAll(".tv-ticker-item");
  items.forEach(item=>{
    const symbol = item.querySelector(".tv-symbol")?.innerText;
    const price = parseFloat(item.querySelector(".tv-last-price")?.innerText);
    const changeText = item.querySelector(".tv-change")?.innerText;

    if(symbol && price){
      prices[symbol] = price;

      if(changeText){
        const changeValue = parseFloat(changeText);
        changes[symbol] = changeValue;
      }
    }
  });

  calculate();
}

setInterval(extractPrices, 5000);
</script>

</body>
</html>
