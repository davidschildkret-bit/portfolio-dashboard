<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Dashboard</title>

<style>
body {
  margin:0;
  padding:20px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#0f1115;
  color:white;
}
h1 { text-align:center; margin-bottom:10px; }
#total { text-align:center; font-size:2em; margin-bottom:5px; }
#daily { text-align:center; margin-bottom:25px; font-size:1.2em; }
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}
.card {
  background:#1a1d24;
  padding:15px;
  border-radius:12px;
}
.price { font-size:1.3em; margin-top:5px; }
.green { color:#00c853; }
.red { color:#ff5252; }
input {
  width:90px;
  padding:6px;
  border-radius:6px;
  border:none;
  margin-top:8px;
}
</style>
</head>
<body>

<h1>Portfolio Dashboard</h1>
<div id="total">Loading...</div>
<div id="daily"></div>

<div class="grid" id="grid"></div>

<script>

const symbols = ["NVDA","MSFT","AMD","GCOW"];
const shares = {};
const prices = {};
const prevClose = {};

symbols.forEach(sym => shares[sym] = 0);

function createCards() {
  const grid = document.getElementById("grid");

  symbols.forEach(sym => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <strong>${sym}</strong>
      <div class="price" id="price-${sym}">$--</div>
      <div id="change-${sym}"></div>
      Shares:<br>
      <input type="number" min="0" step="any"
        onchange="updateShares('${sym}', this.value)">
      <div id="position-${sym}"></div>
    `;
    grid.appendChild(card);
  });
}

function updateShares(sym, val) {
  shares[sym] = parseFloat(val) || 0;
  calculate();
}

function calculate() {
  let total = 0;
  let daily = 0;

  symbols.forEach(sym => {
    if (prices[sym]) {
      const position = shares[sym] * prices[sym];
      const changePerShare = prices[sym] - prevClose[sym];
      const dayMove = shares[sym] * changePerShare;

      total += position;
      daily += dayMove;

      document.getElementById(`position-${sym}`).innerText =
        "Position: $" + position.toFixed(2);
    }
  });

  document.getElementById("total").innerText =
    "Total Value: $" + total.toFixed(2);

  const dailyEl = document.getElementById("daily");
  dailyEl.innerText =
    "Daily Change: $" + daily.toFixed(2);
  dailyEl.className = daily >= 0 ? "green" : "red";
}

async function fetchPrices() {
  try {
    for (let sym of symbols) {
      const response = await fetch(
        `https://stooq.com/q/l/?s=${sym.toLowerCase()}.us&i=d`
      );
      const text = await response.text();
      const parts = text.split("\n")[1].split(",");

      const close = parseFloat(parts[6]);      // Close
      const open = parseFloat(parts[3]);       // Open

      prices[sym] = close;
      prevClose[sym] = open;

      document.getElementById(`price-${sym}`).innerText =
        "$" + close.toFixed(2);

      const change = close - open;
      const changePct = (change / open) * 100;

      const changeEl = document.getElementById(`change-${sym}`);
      changeEl.innerText =
        change.toFixed(2) +
        " (" +
        changePct.toFixed(2) +
        "%)";
      changeEl.className =
        change >= 0 ? "green" : "red";
    }

    calculate();

  } catch (err) {
    document.getElementById("total").innerText =
      "Price data temporarily unavailable.";
  }
}

createCards();
fetchPrices();
setInterval(fetchPrices, 60000);

</script>

</body>
</html>
